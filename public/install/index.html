<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>Nexvia CRM — Chrome으로 열기</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1.5rem;
        font-family: Inter, Manrope, sans-serif;
        text-align: center;
        background: #fff;
        color: #1a2838;
      }
      p {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.6;
        color: #5f6b7a;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.5rem;
        padding: 0.85rem 1.25rem;
        border-radius: 0.75rem;
        background: #2c6485;
        color: #f5f9ff;
        font-size: 0.95rem;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
    <script>
      (function () {
        var DEST = "https://www.nexviacrm.co.kr/?from=install";
        var ua = navigator.userAgent || "";
        var isAndroid = /android/i.test(ua);

        function buildIntent() {
          var fallback = encodeURIComponent(DEST);
          return (
            "intent://www.nexviacrm.co.kr/?from=install#Intent;" +
            "scheme=https;" +
            "action=android.intent.action.VIEW;" +
            "category=android.intent.category.BROWSABLE;" +
            "package=com.android.chrome;" +
            "S.browser_fallback_url=" +
            fallback +
            ";end"
          );
        }

        if (!isAndroid) {
          location.replace(DEST);
          return;
        }

        var intent = buildIntent();
        try {
          location.replace(intent);
        } catch (e) {}

        setTimeout(function () {
          try {
            location.href =
              "googlechrome://navigate?url=" + encodeURIComponent(DEST);
          } catch (e2) {}
        }, 350);

        setTimeout(function () {
          location.replace(DEST);
        }, 1800);

        window.__nexviaChromeIntent = intent;
      })();
    </script>
  </head>
  <body>
    <p>Google <strong>Chrome</strong>으로 이동 중입니다…</p>
    <p>자동 이동이 안 되면 아래 버튼을 눌러 주세요.</p>
    <a id="nexvia-open-chrome" href="#">Chrome에서 열기</a>
    <script>
      (function () {
        var link = document.getElementById("nexvia-open-chrome");
        if (!link) return;
        link.href =
          window.__nexviaChromeIntent ||
          "https://www.nexviacrm.co.kr/?from=install";
      })();
    </script>
  </body>
</html>
